<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --surface: #f9f9ff;
        --surface-low: #f0f3ff;
        --surface-container: #e7eeff;
        --card: #ffffff;
        --on-surface: #111c2c;
        --on-variant: #40484d;
        --outline: #70787d;
        --outline-variant: #bfc8cd;
        --border: #d3dbe2;
        --primary: #00455b;
        --primary-container: #005e7a;
        --on-primary: #ffffff;
        --on-primary-container: #92d6f6;
        --inverse-surface: #263142;
        --error: #ba1a1a;
        --error-container: #ffdad6;
        --on-error-container: #93000a;
        --ok: #059669;
        --warn: #b45309;
        --fail: #e11d48;
      }
      * { box-sizing: border-box; }
      body {
        width: 380px;
        margin: 0;
        padding: 16px;
        font: 14px/1.5 "Manrope", system-ui, -apple-system, sans-serif;
        background: var(--surface);
        color: var(--on-surface);
      }

      /* Header */
      .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
      .brand .logo {
        width: 44px; height: 44px; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        background: var(--inverse-surface);
      }
      .brand h1 { margin: 0; font-size: 18px; font-weight: 700; color: var(--primary); letter-spacing: -0.01em; }

      /* Typography helpers */
      .label-caps {
        font-family: ui-monospace, "JetBrains Mono", monospace;
        font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
        text-transform: uppercase; color: var(--on-variant);
      }
      label { display: block; font-size: 11px; font-weight: 600; color: var(--on-variant); margin: 12px 0 5px; }

      /* Flat card */
      .card {
        border: 1px solid var(--border);
        background: var(--surface-low);
        border-radius: 16px;
        padding: 16px;
      }
      .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

      /* Inputs */
      input, select {
        width: 100%; padding: 11px 13px;
        border: 1px solid var(--outline-variant); border-radius: 12px;
        background: var(--card); color: var(--on-surface); outline: none;
        font-size: 14px; font-family: inherit;
      }
      input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,69,91,.15); }

      /* Buttons */
      .btn {
        flex: 1; padding: 13px; border: 0; border-radius: 12px;
        font-weight: 700; font-size: 14px; font-family: inherit; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        transition: filter .15s, transform .06s, background .15s, border-color .15s, color .15s;
      }
      .btn-primary { background: var(--primary-container); color: var(--on-primary); }
      .btn-primary:hover { filter: brightness(1.08); }
      .btn-primary:active { transform: scale(.98); }
      .btn-primary:disabled { opacity: .55; cursor: default; }
      .btn-ghost { background: var(--surface-low); color: var(--on-variant); border: 1px solid var(--border); }
      .btn-ghost:hover { background: var(--surface-container); color: var(--primary); }
      .btn-ghost:active { transform: scale(.98); }
      .btn-danger { background: var(--error-container); color: var(--on-error-container); }
      .btn-danger:hover { filter: brightness(.97); }
      #run { flex: 1.5; }

      .row { display: flex; gap: 12px; margin-top: 16px; }
      .account { font-size: 12px; color: var(--ok); margin-bottom: 12px; font-weight: 600; }
      .status { margin-top: 12px; font-size: 12px; color: var(--on-variant); }
      .hidden { display: none !important; }

      /* Progress view */
      .pill {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700;
      }
      .pill .dot { width: 7px; height: 7px; border-radius: 50%; }
      .pill.running { background: #cfe6ff; color: #004d65; }
      .pill.running .dot { background: var(--primary-container); animation: pulse 1.1s infinite; }
      .pill.paused { background: #fef3c7; color: #92400e; } .pill.paused .dot { background: var(--warn); }
      .pill.stopped { background: #e5e7eb; color: #374151; } .pill.stopped .dot { background: #6b7280; }
      .pill.ok { background: #d1fae5; color: #065f46; } .pill.ok .dot { background: var(--ok); }
      .pill.fail { background: var(--error-container); color: var(--on-error-container); } .pill.fail .dot { background: var(--fail); }
      @keyframes pulse { 0% { opacity: 1; } 50% { opacity: .3; } 100% { opacity: 1; } }
      #run-name { font-weight: 700; font-size: 16px; margin: 2px 0 0; }
      #log {
        margin-top: 14px; max-height: 260px; overflow: auto;
        border: 1px solid var(--border); border-radius: 12px; padding: 10px; background: var(--card);
      }
      .item { display: flex; gap: 7px; align-items: baseline; padding: 3px 0; font-size: 12px; }
      .item .mark { font-weight: 700; }
      .item.ok .mark { color: var(--ok); } .item.warn .mark { color: var(--warn); } .item.fail .mark { color: var(--fail); }
      #downloads { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
      #downloads a {
        padding: 7px 12px; background: var(--primary-container); color: var(--on-primary);
        border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 12px;
      }
      .empty { color: var(--on-variant); font-size: 12px; padding: 8px 2px; }
    </style>
  </head>
  <body>
    <!-- Brand header (shared) -->
    <div class="brand">
      <span class="logo">
        <svg width="26" height="26" viewBox="0 0 40 40" aria-hidden="true">
          <path d="M12 20L18 26L28 14" stroke="#f9f9ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          <circle cx="20" cy="20" r="16" stroke="#8ccff0" stroke-width="2" stroke-dasharray="4 4" fill="none" />
        </svg>
      </span>
      <div>
        <h1>WebBot Runner</h1>
      </div>
    </div>

    <!-- Picker view -->
    <section id="view-picker">
      <div id="account" class="account hidden"></div>

      <div id="conn">
        <label for="backend">Backend URL</label>
        <input id="backend" value="http://localhost:3000" />
        <label for="token">API token</label>
        <input id="token" type="password" placeholder="Download your extension from the dashboard" autocomplete="off" />
      </div>

      <div class="card" style="margin-top: 14px">
        <div class="card-head">
          <span class="label-caps">Active Workflow</span>
        </div>
        <select id="workflow"><option>Loading…</option></select>
      </div>

      <div class="row">
        <button id="refresh" class="btn btn-ghost">Reload</button>
        <button id="run" class="btn btn-primary">Run on this tab</button>
      </div>

      <div id="status" class="status"></div>
    </section>

    <!-- Progress view -->
    <section id="view-progress" class="hidden">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
        <p id="run-name">Workflow</p>
        <span id="run-pill" class="pill running"><span class="dot"></span><span id="run-pill-text">Running</span></span>
      </div>
      <div id="log"></div>
      <div id="downloads"></div>
      <div class="row" id="run-controls">
        <button id="pause" class="btn btn-ghost">⏸ Pause</button>
        <button id="resume" class="btn btn-ghost hidden">▶ Resume</button>
        <button id="stop" class="btn btn-danger">■ Stop</button>
      </div>
      <div class="row">
        <button id="back" class="btn btn-ghost">← Back to workflows</button>
      </div>
    </section>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
