<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --surface: #f5f6ff;
        --card: #ffffff;
        --on-surface: #252f43;
        --on-variant: #525b72;
        --outline: #a3adc7;
        --primary: #006382;
        --on-primary: #e5f5ff;
        --primary-container: #7bd1fa;
        --on-primary-container: #00465d;
        --error: #b31b25;
        --ok: #059669;
        --warn: #b45309;
        --fail: #e11d48;
      }
      * { box-sizing: border-box; }
      body {
        width: 360px;
        margin: 0;
        padding: 16px;
        font: 13px/1.5 system-ui, -apple-system, sans-serif;
        background: var(--surface);
        color: var(--on-surface);
      }
      .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
      .brand h1 { margin: 0; font-size: 16px; font-weight: 700; color: var(--primary); }
      .brand p { margin: 0; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--on-variant); }
      label { display: block; font-size: 11px; color: var(--on-variant); margin: 10px 0 4px; }
      input, select {
        width: 100%; padding: 9px 11px;
        border: 1px solid var(--outline); border-radius: 10px;
        background: var(--card); color: var(--on-surface); outline: none; font-size: 13px;
      }
      input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,99,130,.15); }
      .btn {
        width: 100%; padding: 11px; border: 0; border-radius: 10px;
        font-weight: 700; font-size: 13px; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        transition: filter .15s, transform .05s;
      }
      .btn-primary { background: var(--primary); color: var(--on-primary); }
      .btn-primary:hover { filter: brightness(1.1); }
      .btn-primary:active { transform: scale(.98); }
      .btn-primary:disabled { opacity: .55; cursor: default; }
      .btn-ghost { background: transparent; color: var(--on-variant); border: 1px solid var(--outline); }
      .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
      .row { display: flex; gap: 8px; margin-top: 12px; }
      .account { font-size: 12px; color: var(--ok); margin-bottom: 10px; font-weight: 600; }
      .status { margin-top: 10px; font-size: 12px; color: var(--on-variant); }
      .hidden { display: none; }

      /* progress view */
      .pill {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700;
      }
      .pill .dot { width: 7px; height: 7px; border-radius: 50%; }
      .pill.running { background: #e0f2fe; color: #075985; }
      .pill.running .dot { background: #0284c7; animation: pulse 1.1s infinite; }
      .pill.ok { background: #d1fae5; color: #065f46; } .pill.ok .dot { background: var(--ok); }
      .pill.fail { background: #ffe4e6; color: #9f1239; } .pill.fail .dot { background: var(--fail); }
      @keyframes pulse { 0% { opacity: 1; } 50% { opacity: .3; } 100% { opacity: 1; } }
      #run-name { font-weight: 700; font-size: 14px; margin: 2px 0 0; }
      #log {
        margin-top: 12px; max-height: 260px; overflow: auto;
        border: 1px solid #e2e6f5; border-radius: 10px; padding: 8px; background: var(--card);
      }
      .item { display: flex; gap: 7px; align-items: baseline; padding: 3px 0; font-size: 12px; }
      .item .mark { font-weight: 700; }
      .item.ok .mark { color: var(--ok); } .item.warn .mark { color: var(--warn); } .item.fail .mark { color: var(--fail); }
      #downloads { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
      #downloads a {
        padding: 6px 11px; background: var(--primary-container); color: var(--on-primary-container);
        border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 12px;
      }
      .empty { color: var(--on-variant); font-size: 12px; padding: 8px 2px; }
    </style>
  </head>
  <body>
    <!-- Brand header (shared) -->
    <div class="brand">
      <svg width="32" height="32" viewBox="0 0 40 40">
        <rect width="40" height="40" rx="8" fill="#0f172a" />
        <path d="M12 20L18 26L28 14" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <circle cx="20" cy="20" r="16" stroke="white" stroke-width="2" stroke-dasharray="4 4" fill="none" />
      </svg>
      <div>
        <h1>WebBot Runner</h1>
        <p id="brand-sub">Automation Platform</p>
      </div>
    </div>

    <!-- Picker view -->
    <section id="view-picker">
      <div id="account" class="account hidden"></div>

      <div id="conn">
        <label for="backend">Backend URL</label>
        <input id="backend" value="http://localhost:3000" />
        <label for="token">API token</label>
        <input id="token" type="password" placeholder="Download your extension from the dashboard" autocomplete="off" />
      </div>

      <label for="workflow">Workflow</label>
      <select id="workflow"><option>Loading…</option></select>

      <div class="row">
        <button id="refresh" class="btn btn-ghost">Refresh</button>
        <button id="run" class="btn btn-primary">Run on this tab</button>
      </div>

      <div id="status" class="status"></div>
    </section>

    <!-- Progress view -->
    <section id="view-progress" class="hidden">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
        <p id="run-name">Workflow</p>
        <span id="run-pill" class="pill running"><span class="dot"></span><span id="run-pill-text">Running</span></span>
      </div>
      <div id="log"></div>
      <div id="downloads"></div>
      <div class="row">
        <button id="back" class="btn btn-ghost">← Back to workflows</button>
      </div>
    </section>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
