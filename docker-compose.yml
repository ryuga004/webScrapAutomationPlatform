services:
  db:
    image: postgres:16-alpine
    container_name: webbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webbot
    ports:
      - "5432:5432"
    volumes:
      - webbot-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Lightweight web UI for inspecting the database at http://localhost:8080
  # (System: PostgreSQL, Server: db, User/Pass: postgres, Database: webbot).
  adminer:
    image: adminer:latest
    container_name: webbot-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  webbot-db-data:
